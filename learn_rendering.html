    <div class="step-contents">
        レンダリングとは、作成した3Dデータをカメラから映し出された2D画像に書き出すことです。<br>
        レンダリングはレンダーエンジンというソフトウェアによって行われ、Blenderには標準で二種類のエンジンが搭載されています。<br>
        <br>
        EEVEE:デフォルトのレンダーエンジンで、素早い書き出しができる。<br>
        Cycles: 高精度のレンダーエンジンで非常にリアルな表現が可能だが、書き出しの時間が長い。
    </div>
