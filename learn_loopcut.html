    <div class="step-contents">
        編集モードで使用できる機能です。<br>
        面に対して行うと、繋がった面に辺を追加することができます。辺に対して行うと、各辺に頂点を追加できます。<br>
        マウスホイールで分割数を変更でき、左クリックで決定されます。分割数決定後マウスを動かすと分割の位置を調整できます。もう一度左クリックすると位置が確定します。<br>
        この時右クリックを押すと位置を変更せず等分することができます。
